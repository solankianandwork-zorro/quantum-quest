<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Straw Hat Jolly Roger">
  <defs>
    <g id="bone">
      <rect x="-78" y="-10" width="156" height="20" rx="10"/>
      <circle cx="-78" cy="-12" r="14"/><circle cx="-78" cy="12" r="14"/>
      <circle cx="78" cy="-12" r="14"/><circle cx="78" cy="12" r="14"/>
    </g>
  </defs>

  <!-- crossbones + skull, drawn in map ink -->
  <g fill="#46341d">
    <g transform="translate(110,124)">
      <use href="#bone" transform="rotate(45)"/>
      <use href="#bone" transform="rotate(-45)"/>
    </g>
    <!-- skull head + jaw -->
    <path d="M110 46
             C79 46 57 70 57 101
             C57 121 67 135 81 143
             L81 157 C81 165 89 169 97 167
             C101 173 119 173 123 167
             C131 169 139 165 139 157
             L139 143
             C153 135 163 121 163 101
             C163 70 141 46 110 46 Z"/>
  </g>

  <!-- eyes / nose / teeth cut out in parchment tone -->
  <g fill="#efe0bd">
    <ellipse cx="90"  cy="101" rx="16" ry="19"/>
    <ellipse cx="130" cy="101" rx="16" ry="19"/>
    <path d="M110 114 l11 21 l-22 0 Z"/>
    <rect x="92"  y="150" width="6" height="15"/>
    <rect x="104" y="150" width="6" height="17"/>
    <rect x="116" y="150" width="6" height="15"/>
  </g>

  <!-- straw hat with red band -->
  <g>
    <ellipse cx="110" cy="54" rx="76" ry="19" fill="#d9a441" stroke="#a9762b" stroke-width="2"/>
    <path d="M61 52 C61 27 85 14 110 14 C135 14 159 27 159 52 Z" fill="#e8b454" stroke="#a9762b" stroke-width="2"/>
    <rect x="61" y="45" width="98" height="11" rx="5" fill="#c0392b"/>
  </g>
</svg>
